version: "3.9"

services:
  backend:
    build: ./backend
    container_name: tmall-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_PATH: /app/data/app.db
      ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"
    volumes:
      - tmall_data:/app/data

  frontend:
    build: ./frontend
    container_name: tmall-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  tmall_data:
